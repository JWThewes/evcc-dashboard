<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}evcc dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ base_path }}/static/css/app.css">
    <script src="{{ base_path }}/static/js/htmx.min.js" defer></script>
    <script src="{{ base_path }}/static/js/echarts.min.js" defer></script>
    <script src="{{ base_path }}/static/js/charts.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="{{ base_path }}/">EVCC Dashboard</a>
        </div>
        <div class="navbar-links">
            <a href="{{ base_path }}/" class="nav-link">Dashboard</a>
            <a href="{{ base_path }}/history" class="nav-link">History</a>
            <a href="{{ base_path }}/settings" class="nav-link">Settings</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
