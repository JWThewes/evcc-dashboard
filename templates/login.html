<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - evcc dashboard</title>
    <link rel="stylesheet" href="{{ base_path }}/static/css/app.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            width: 100%;
            max-width: 360px;
        }
        .login-card h1 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .login-card input[type="password"] {
            width: 100%;
            padding: 0.6rem 0.75rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .login-card input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        .login-card button {
            width: 100%;
            padding: 0.6rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        .login-card button:hover {
            opacity: 0.9;
        }
        .login-error {
            color: var(--red);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <form class="login-card" method="post" action="{{ base_path }}/login">
            <h1>EVCC Dashboard</h1>
            {% if error %}
            <p class="login-error">Invalid password</p>
            {% endif %}
            <input type="password" name="password" placeholder="Password" autofocus required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
